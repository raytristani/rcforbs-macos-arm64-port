name: RCForb
options:
  bundleIdPrefix: com.remotehams
  deploymentTarget:
    iOS: "17.0"

targets:
  RCForb:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "App/Info.plist"
          - "Fonts"
          - "Images"
    resources:
      - path: Assets.xcassets
      - path: Sources/Fonts
        buildPhase: resources
      - path: Sources/Images
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotehams.rcforb.ipad
        PRODUCT_NAME: "RCForb Client"
        MARKETING_VERSION: "1.0.6"
        CURRENT_PROJECT_VERSION: "9"
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_FILE: "$(SRCROOT)/Sources/App/Info.plist"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
